<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人Todo看板</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>个人Todo看板</h1>
            <div class="header-actions">
                <input type="text" id="search-input" placeholder="搜索任务..." class="search-input">
                <button id="add-task-btn" class="btn btn-primary">新增任务</button>
                <button id="export-btn" class="btn btn-secondary">导出数据</button>
                <input type="file" id="import-file" accept=".json" style="display: none;">
                <button id="import-btn" class="btn btn-secondary">导入数据</button>
            </div>
        </header>

        <section class="stats">
            <div class="stat-card">
                <div class="stat-number" id="total-tasks">0</div>
                <div class="stat-label">总任务数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="completion-rate">0%</div>
                <div class="stat-label">任务完成率</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="today-deadlines">0</div>
                <div class="stat-label">今日到期</div>
            </div>
        </section>

        <main class="main-content">
            <div class="tabs">
                <div class="tab active" data-tab="todo">
                    <span class="tab-title">待办</span>
                    <span class="tab-count" id="todo-count">0</span>
                </div>
                <div class="tab" data-tab="in-progress">
                    <span class="tab-title">进行中</span>
                    <span class="tab-count" id="in-progress-count">0</span>
                </div>
                <div class="tab" data-tab="completed">
                    <span class="tab-title">已完成</span>
                    <span class="tab-count" id="completed-count">0</span>
                </div>
                <div class="tab" data-tab="abandoned">
                    <span class="tab-title">已放弃</span>
                    <span class="tab-count" id="abandoned-count">0</span>
                </div>
            </div>

            <div class="kanban-board">
                <div class="column" id="todo-column" data-column="todo">
                    <div class="column-header">
                        <h2>待办</h2>
                    </div>
                    <div class="task-list" id="todo-list"></div>
                </div>

                <div class="column" id="in-progress-column" data-column="in-progress">
                    <div class="column-header">
                        <h2>进行中</h2>
                    </div>
                    <div class="task-list" id="in-progress-list"></div>
                </div>

                <div class="column" id="completed-column" data-column="completed">
                    <div class="column-header">
                        <h2>已完成</h2>
                    </div>
                    <div class="task-list" id="completed-list"></div>
                </div>

                <div class="column" id="abandoned-column" data-column="abandoned">
                    <div class="column-header">
                        <h2>已放弃</h2>
                    </div>
                    <div class="task-list" id="abandoned-list"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- 任务表单模态框 -->
    <div id="task-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modal-title">新增任务</h2>
            <form id="task-form">
                <input type="hidden" id="task-id">
                <div class="form-group">
                    <label for="task-title">标题:</label>
                    <input type="text" id="task-title" required>
                </div>
                <div class="form-group">
                    <label for="task-description">描述:</label>
                    <textarea id="task-description" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label for="task-deadline">截止日期:</label>
                    <input type="date" id="task-deadline" required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">保存</button>
                    <button type="button" id="cancel-btn" class="btn btn-secondary">取消</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 删除确认模态框 -->
    <div id="delete-modal" class="modal">
        <div class="modal-content">
            <h2>确认删除</h2>
            <p>确定要删除这个任务吗？</p>
            <div class="form-actions">
                <button id="confirm-delete" class="btn btn-danger">删除</button>
                <button id="cancel-delete" class="btn btn-secondary">取消</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
